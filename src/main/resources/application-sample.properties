# MongoDB Atlas Configuration - REPLACE WITH YOUR ACTUAL VALUES
# Example: mongodb+srv://username:password@cluster0.xxxxx.mongodb.net/authdb?retryWrites=true&w=majority
spring.data.mongodb.uri=mongodb+srv://<your-username>:<your-password>@<your-cluster>.mongodb.net/<your-database>?retryWrites=true&w=majority
spring.data.mongodb.database=authdb

# JWT Configuration - CHANGE THE SECRET IN PRODUCTION
app.jwtSecret=mySecretKeyChangeThis
app.jwtExpirationMs=86400000

# Server Configuration
server.port=8080

# Logging
logging.level.com.example=DEBUG
logging.level.org.springframework.security=DEBUG

# Instructions:
# 1. Copy this file to application.properties
# 2. Replace the MongoDB URI with your actual Atlas connection string
# 3. Change the JWT secret to a secure random string in production
# 4. Update the database name if needed